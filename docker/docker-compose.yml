# Full local stack: postgres+pgvector, backend, frontend.
#
# Default embedding provider is in-process sentence-transformers, so this stack
# needs NO Ollama. Set GROQ_API_KEY for online LLM parsing; without it, parsing
# falls back to offline mode which requires the optional `ollama` profile
# (docker compose --profile offline up).
#
#   docker compose -f docker/docker-compose.yml up --build
#
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resume_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resume_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/resume_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-in-production}
      CORS_ORIGINS: http://localhost:3000
      LLM_MODE: ${LLM_MODE:-auto}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-sentence_transformers}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      VECTOR_STORE: pgvector
      UPLOAD_DIR: /data/uploads
    ports:
      - "8000:8000"
    volumes:
      - uploads:/data/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"

  # Optional fully-offline LLM (+ embeddings) path. Enable with:
  #   docker compose --profile offline up
  # Then set EMBEDDING_PROVIDER=ollama EMBEDDING_DIMENSION=768 in the backend env.
  ollama:
    image: ollama/ollama:latest
    profiles: ["offline"]
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  pgdata:
  uploads:
  ollama:
